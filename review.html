<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Review - Honestly, it.....</title>
    <link rel="stylesheet" href="style.css?v=5">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .review-page {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
        }
        
        .review-header {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid var(--border-color);
        }
        
        .review-album-art {
            flex: 0 0 300px;
        }
        
        .review-album-art img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: var(--shadow-md);
        }
        
        .review-album-art .no-image {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #ff1493, #ffd700);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
        }
        
        .review-info {
            flex: 1;
        }
        
        .review-genre {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--bg-secondary);
            color: #ff1493;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        
        .review-title {
            font-size: 2.5rem;
            margin: 0 0 0.25rem 0;
        }
        
        .review-artist {
            font-size: 1.25rem;
            color: #ff1493;
            margin-bottom: 0.5rem;
        }
        
        .review-year {
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
        
        .review-rating {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1rem 0;
        }
        
        .review-rating-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffd700;
        }
        
        .embed-container {
            margin: 2rem 0;
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 15px;
        }
        
        .embed-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .spotify-embed {
            margin: 2rem 0;
            border-radius: 15px;
            overflow: hidden;
        }
        
        .review-section {
            margin: 2rem 0;
        }
        
        .review-section h3 {
            color: #ff1493;
            margin-bottom: 1rem;
        }
        
        .track-list {
            margin-top: 2rem;
        }
        
        .track-item-page {
            margin: 1rem 0;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 10px;
        }
        
        .track-header-page {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        
        .track-name-page {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffd700;
        }
        
        .track-rating-page {
            background: #ff1493;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            color: white;
            font-size: 0.85rem;
        }
        
        .back-button {
            display: inline-block;
            margin-bottom: 2rem;
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            color: #ff1493;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .comments-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 2px solid var(--border-color);
        }
        
        .comment-form {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 2rem;
        }
        
        .comment-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 0.95rem;
            resize: vertical;
            margin-bottom: 1rem;
            font-family: inherit;
        }
        
        .post-comment-btn {
            background: linear-gradient(135deg, #ff1493, #ffd700);
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .comment-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 1rem;
        }
        
        .comment-avatar-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff1493, #ffd700);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }
        
        .comment-content {
            flex: 1;
        }
        
        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        
        .comment-username {
            font-weight: 600;
            color: #ff1493;
        }
        
        .comment-date {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        .comment-text {
            line-height: 1.5;
            word-break: break-word;
        }
        
        @media (max-width: 768px) {
            .review-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .review-title {
                font-size: 1.75rem;
            }
            .review-album-art img,
            .review-album-art .no-image {
                width: 250px;
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">Honestly, it.....</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="reviews.html">Reviews</a></li>
                <li><a href="community.html">Community</a></li>
            </ul>
            <div class="user-menu">
                <div id="authButtons">
                    <button id="signInBtn" class="auth-nav-btn">Sign In</button>
                    <button id="signUpBtn" class="auth-nav-btn-primary">Sign Up</button>
                </div>
                <div id="userAvatarContainer" style="display: none;">
                    <button id="userAvatarBtn" class="user-avatar-btn" onclick="toggleUserDropdown()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z" fill="white"/>
                        </svg>
                    </button>
                    <div id="userDropdown" class="user-dropdown" style="display: none;">
                        <div class="user-dropdown-email" id="userEmailDisplay"></div>
                        <a href="profile.html" class="user-dropdown-item">My Profile</a>
                        <a href="settings.html" class="user-dropdown-item">Settings</a>
                        <div class="dropdown-divider"></div>
                        <button id="signOutBtn" class="user-dropdown-item" style="color: #ff1493;">Sign Out</button>
                    </div>
                </div>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 12H21M3 6H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </nav>

    <div class="mobile-nav-overlay" id="mobileNavOverlay"></div>
    <div class="mobile-nav-menu" id="mobileNavMenu">
        <div class="mobile-nav-header">
            <span class="logo-text">Menu</span>
            <button class="mobile-nav-close" id="mobileNavClose">×</button>
        </div>
        <ul class="mobile-nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="reviews.html">Reviews</a></li>
            <li><a href="community.html">Community</a></li>
        </ul>
        <div id="mobileAuthContainer"></div>
    </div>

    <div class="container">
        <div id="reviewContent" class="review-page">
            <div style="text-align: center; padding: 3rem;">Loading review...</div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-bottom">
                <p>&copy; 2024 Honestly, it..... All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div id="authModal" class="auth-modal-overlay">
        <div class="auth-modal">
            <div class="auth-modal-header">
                <h2 id="authModalTitle">Welcome Back</h2>
                <span class="auth-close" id="closeAuthModalBtn">&times;</span>
            </div>
            <div class="auth-modal-body" id="authModalBody"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyArSLD6TCMLWGo9uPb_IqwiOr_tkhDe1ag",
  authDomain: "honestly-it.firebaseapp.com",
  projectId: "honestly-it",
  storageBucket: "honestly-it.firebasestorage.app",
  messagingSenderId: "938783642355",
  appId: "1:938783642355:web:330ad714c0f79b7eb25d86",
  measurementId: "G-R8Q5308Y8K"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Get review ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const reviewId = urlParams.get('id');
        
        console.log("Looking for review ID:", reviewId);
        
        let currentUser = null;

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderStars(rating) {
            const fullStars = Math.floor(rating / 2);
            const decimal = rating / 2 - fullStars;
            let starsHTML = '';
            for (let i = 0; i < fullStars; i++) starsHTML += '<span style="color: #ffd700;">★</span>';
            if (decimal >= 0.5) starsHTML += '<span style="color: #ffd700;">½</span>';
            const emptyStars = 5 - Math.ceil(rating / 2);
            for (let i = 0; i < emptyStars; i++) starsHTML += '<span style="color: var(--text-muted);">☆</span>';
            return starsHTML;
        }

        async function loadReviewData() {
            const container = document.getElementById('reviewContent');
            
            if (!reviewId) {
                container.innerHTML = '<div style="text-align: center; padding: 3rem;">No review ID provided. <a href="index.html" class="back-button">← Back to Home</a></div>';
                return;
            }
            
            try {
                // First try to find by firebaseId (document ID)
                const reviewsRef = collection(db, 'reviews');
                const q = query(reviewsRef, where('__name__', '==', reviewId));
                const querySnapshot = await getDocs(q);
                
                let review = null;
                
                if (!querySnapshot.empty) {
                    querySnapshot.forEach((doc) => {
                        review = { firebaseId: doc.id, ...doc.data() };
                    });
                } else {
                    // If not found by ID, try to find by the id field
                    const q2 = query(reviewsRef, where('id', '==', parseInt(reviewId)));
                    const querySnapshot2 = await getDocs(q2);
                    if (!querySnapshot2.empty) {
                        querySnapshot2.forEach((doc) => {
                            review = { firebaseId: doc.id, ...doc.data() };
                        });
                    }
                }
                
                console.log("Found review:", review);
                
                if (!review) {
                    container.innerHTML = `<div style="text-align: center; padding: 3rem;"><h2>Review not found</h2><p>ID: ${reviewId}</p><a href="index.html" class="back-button">← Back to Home</a></div>`;
                    return;
                }
                
                let albumArtHtml = review.albumArt ? `<img src="${review.albumArt}" onerror="this.parentElement.innerHTML='<div class=\'no-image\'>🎵</div>'">` : '<div class="no-image">🎵</div>';
                
                let embedHtml = '';
                if (review.embedUrl && review.embedType === 'youtube') {
                    embedHtml = `<div class="embed-container"><iframe src="${review.embedUrl}" frameborder="0" allowfullscreen></iframe></div>`;
                } else if (review.embedUrl && review.embedType === 'spotify') {
                    embedHtml = `<div class="spotify-embed"><iframe src="${review.embedUrl}" width="100%" height="152" frameborder="0" allow="encrypted-media"></iframe></div>`;
                }
                
                let tracksHtml = '';
                if (review.tracks && review.tracks.length) {
                    tracksHtml = '<div class="track-list"><h3>🎵 Track-by-Track Review</h3>';
                    review.tracks.forEach(track => {
                        tracksHtml += `
                            <div class="track-item-page">
                                <div class="track-header-page">
                                    <span class="track-name-page">${track.number}. ${escapeHtml(track.name)}</span>
                                    ${track.rating ? `<span class="track-rating-page">${track.rating}/10</span>` : ''}
                                </div>
                                <p>${escapeHtml(track.review)}</p>
                            </div>
                        `;
                    });
                    tracksHtml += '</div>';
                }
                
                // Display artist(s)
                let artistDisplay = '';
                if (review.artists && review.artists.length) {
                    artistDisplay = review.artists.join(', ');
                } else if (review.artist) {
                    artistDisplay = review.artist;
                } else {
                    artistDisplay = 'Unknown Artist';
                }
                
                container.innerHTML = `
                    <a href="index.html" class="back-button">← Back to Reviews</a>
                    <div class="review-header">
                        <div class="review-album-art">${albumArtHtml}</div>
                        <div class="review-info">
                            <span class="review-genre">${Array.isArray(review.genre) ? review.genre.join(', ') : review.genre}</span>
                            <h1 class="review-title">${escapeHtml(review.title)}</h1>
                            <p class="review-artist">${escapeHtml(artistDisplay)}</p>
                            <p class="review-year">${review.year || 'Release year N/A'}</p>
                            <div class="review-rating">
                                <span class="review-rating-number">${review.rating}</span>
                                <span>/10</span>
                                <div>${renderStars(review.rating)}</div>
                            </div>
                        </div>
                    </div>
                    ${embedHtml}
                    <div class="review-section">
                        <h3>📝 Overall Review</h3>
                        <p>${escapeHtml(review.review)}</p>
                    </div>
                    ${tracksHtml}
                    <div class="comments-section" id="commentsSection"></div>
                `;
                
                loadCommentsUI();
                
            } catch (error) {
                console.error("Error loading review:", error);
                container.innerHTML = `<div style="text-align: center; padding: 3rem;"><h2>Error loading review</h2><p>${error.message}</p><a href="index.html" class="back-button">← Back to Home</a></div>`;
            }
        }

        function loadCommentsUI() {
            const commentsSection = document.getElementById('commentsSection');
            if (!commentsSection) return;
            
            if (currentUser) {
                commentsSection.innerHTML = `
                    <h3>💬 Comments</h3>
                    <div class="comment-form">
                        <textarea id="commentInput" class="comment-input" rows="3" placeholder="Share your thoughts..."></textarea>
                        <button onclick="postComment()" class="post-comment-btn">Post Comment</button>
                    </div>
                    <div id="commentsList"></div>
                `;
            } else {
                commentsSection.innerHTML = `
                    <h3>💬 Comments</h3>
                    <div class="auth-prompt"><p>Join the discussion! Sign in to leave a comment.</p></div>
                    <div id="commentsList"></div>
                `;
            }
            loadComments();
        }

        function loadComments() {
            // Comment loading logic here
            const commentsList = document.getElementById('commentsList');
            if (commentsList) {
                commentsList.innerHTML = '<div style="text-align: center; padding: 2rem;">Comments coming soon...</div>';
            }
        }

        window.postComment = async function() {
            alert('Comment feature coming soon!');
        };

        // Mobile Navigation
        function initMobileNav() {
            const menuBtn = document.getElementById('mobileMenuBtn');
            const navOverlay = document.getElementById('mobileNavOverlay');
            const navMenu = document.getElementById('mobileNavMenu');
            const navClose = document.getElementById('mobileNavClose');
            if (!menuBtn) return;
            menuBtn.addEventListener('click', () => { navMenu.classList.add('open'); navOverlay.style.display = 'block'; document.body.style.overflow = 'hidden'; });
            navClose.addEventListener('click', () => { navMenu.classList.remove('open'); navOverlay.style.display = 'none'; document.body.style.overflow = ''; });
            navOverlay.addEventListener('click', () => { navMenu.classList.remove('open'); navOverlay.style.display = 'none'; document.body.style.overflow = ''; });
            document.querySelectorAll('.mobile-nav-links a').forEach(link => link.addEventListener('click', () => { navMenu.classList.remove('open'); navOverlay.style.display = 'none'; document.body.style.overflow = ''; }));
        }

        function updateMobileAuth(user) {
            const mobileAuthContainer = document.getElementById('mobileAuthContainer');
            if (!mobileAuthContainer) return;
            if (user) {
                const displayName = user.displayName || user.email.split('@')[0];
                const avatarLetter = displayName.charAt(0).toUpperCase();
                mobileAuthContainer.innerHTML = `
                    <div class="mobile-user-info">
                        <div class="mobile-user-avatar">${avatarLetter}</div>
                        <div class="mobile-user-details">
                            <div class="mobile-user-name">${escapeHtml(displayName)}</div>
                            <div class="mobile-user-email">${escapeHtml(user.email)}</div>
                        </div>
                        <button class="mobile-logout-btn" id="mobileSignOutBtn">Sign Out</button>
                    </div>
                `;
                document.getElementById('mobileSignOutBtn')?.addEventListener('click', () => { signOut(auth); closeMobileMenu(); });
            } else {
                mobileAuthContainer.innerHTML = `
                    <div class="mobile-auth-buttons">
                        <button class="mobile-signin-btn" id="mobileSignInBtn">Sign In</button>
                        <button class="mobile-signup-btn" id="mobileSignUpBtn">Create Account</button>
                    </div>
                `;
                document.getElementById('mobileSignInBtn')?.addEventListener('click', () => showAuthModal('login'));
                document.getElementById('mobileSignUpBtn')?.addEventListener('click', () => showAuthModal('signup'));
            }
        }

        function closeMobileMenu() {
            const navMenu = document.getElementById('mobileNavMenu');
            const navOverlay = document.getElementById('mobileNavOverlay');
            if (navMenu) navMenu.classList.remove('open');
            if (navOverlay) navOverlay.style.display = 'none';
            document.body.style.overflow = '';
        }

        function showAuthModal(type) {
            const modal = document.getElementById('authModal');
            const title = document.getElementById('authModalTitle');
            const body = document.getElementById('authModalBody');
            if (type === 'login') {
                title.innerHTML = 'Welcome Back';
                body.innerHTML = `
                    <div id="loginError" class="auth-error" style="display: none;"></div>
                    <div class="auth-input-group"><input type="email" id="loginEmail" class="auth-input" placeholder="Email address"></div>
                    <div class="auth-input-group"><input type="password" id="loginPassword" class="auth-input" placeholder="Password"></div>
                    <button id="doLoginBtn" class="auth-btn-primary">Sign In</button>
                    <div class="auth-divider"><span>or</span></div>
                    <div class="auth-switch">New here? <a id="switchToSignup">Create an account</a></div>
                `;
                document.getElementById('doLoginBtn')?.addEventListener('click', async () => {
                    const email = document.getElementById('loginEmail')?.value;
                    const password = document.getElementById('loginPassword')?.value;
                    try { await signInWithEmailAndPassword(auth, email, password); closeAuthModal(); } 
                    catch (error) { document.getElementById('loginError').style.display = 'block'; document.getElementById('loginError').textContent = error.message; }
                });
                document.getElementById('switchToSignup')?.addEventListener('click', () => showAuthModal('signup'));
            } else {
                title.innerHTML = 'Create Account';
                body.innerHTML = `
                    <div id="signupError" class="auth-error" style="display: none;"></div>
                    <div class="auth-input-group"><input type="text" id="signupName" class="auth-input" placeholder="Display name"></div>
                    <div class="auth-input-group"><input type="email" id="signupEmail" class="auth-input" placeholder="Email address"></div>
                    <div class="auth-input-group"><input type="password" id="signupPassword" class="auth-input" placeholder="Password (min 6 characters)"></div>
                    <button id="doSignupBtn" class="auth-btn-primary">Create Account</button>
                    <div class="auth-divider"><span>or</span></div>
                    <div class="auth-switch">Already have an account? <a id="switchToLogin">Sign In</a></div>
                `;
                document.getElementById('doSignupBtn')?.addEventListener('click', async () => {
                    const name = document.getElementById('signupName')?.value;
                    const email = document.getElementById('signupEmail')?.value;
                    const password = document.getElementById('signupPassword')?.value;
                    if (password.length < 6) { alert('Password must be at least 6 characters'); return; }
                    try { const userCredential = await createUserWithEmailAndPassword(auth, email, password); await updateProfile(userCredential.user, { displayName: name }); closeAuthModal(); } 
                    catch (error) { document.getElementById('signupError').style.display = 'block'; document.getElementById('signupError').textContent = error.message; }
                });
                document.getElementById('switchToLogin')?.addEventListener('click', () => showAuthModal('login'));
            }
            modal.style.display = 'flex';
        }

        function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }

        window.toggleUserDropdown = function() {
            const dropdown = document.getElementById('userDropdown');
            if (dropdown) dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const authDiv = document.getElementById('authButtons');
            const avatarDiv = document.getElementById('userAvatarContainer');
            const userEmailDisplay = document.getElementById('userEmailDisplay');
            if (user) { authDiv.style.display = 'none'; avatarDiv.style.display = 'block'; if (userEmailDisplay) userEmailDisplay.textContent = user.email; }
            else { authDiv.style.display = 'flex'; avatarDiv.style.display = 'none'; }
            updateMobileAuth(user);
            loadReviewData();
        });

        document.getElementById('signOutBtn')?.addEventListener('click', async () => { await signOut(auth); window.location.href = 'index.html'; });
        document.getElementById('signInBtn')?.addEventListener('click', () => showAuthModal('login'));
        document.getElementById('signUpBtn')?.addEventListener('click', () => showAuthModal('signup'));
        document.getElementById('closeAuthModalBtn')?.addEventListener('click', closeAuthModal);
        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('userDropdown');
            const avatarBtn = document.getElementById('userAvatarBtn');
            if (dropdown && avatarBtn && !avatarBtn.contains(e.target) && !dropdown.contains(e.target)) dropdown.style.display = 'none';
            if (e.target === document.getElementById('authModal')) closeAuthModal();
        });

        initMobileNav();
    </script>
</body>
</html>
