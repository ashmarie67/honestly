<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Profile - Honestly, it.....</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .profile-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
        }
        
        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid var(--border-color);
        }
        
        .profile-avatar {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 1rem;
            cursor: pointer;
        }
        
        .profile-avatar-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, #ff1493, #ffd700);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
        }
        
        .avatar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            color: white;
        }
        
        .profile-avatar:hover .avatar-overlay {
            opacity: 1;
        }
        
        .profile-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0.5rem 0 0.25rem;
        }
        
        .profile-email {
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        
        .profile-member-since {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        .profile-section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--bg-secondary);
            border-radius: 16px;
        }
        
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            color: #ff1493;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .info-row {
            display: flex;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .info-label {
            width: 120px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        
        .info-value {
            flex: 1;
            color: var(--text-primary);
        }
        
        .edit-btn {
            background: linear-gradient(135deg, #ff1493, #ffd700);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
        }
        
        .save-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 0.5rem;
            font-family: inherit;
        }
        
        .cancel-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
        }
        
        .edit-input {
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            width: 100%;
            max-width: 300px;
            font-family: inherit;
        }
        
        .genre-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 0.75rem;
            margin-top: 1rem;
        }
        
        .genre-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            padding: 0.5rem;
            background: var(--bg-primary);
            border-radius: 8px;
        }
        
        .selected-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .genre-tag {
            background: linear-gradient(135deg, #ff1493, #ffd700);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
        }
        
        .save-genres-btn {
            margin-top: 1rem;
            background: #28a745;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .stat-card {
            text-align: center;
            padding: 1rem;
            background: var(--bg-primary);
            border-radius: 12px;
        }
        
        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd700;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .danger-zone {
            background: rgba(255,20,147,0.1);
            border: 1px solid #ff1493;
            border-radius: 16px;
            padding: 1.5rem;
            margin-top: 1rem;
        }
        
        .danger-zone h3 {
            color: #ff1493;
            margin-bottom: 1rem;
        }
        
        .delete-account-btn {
            background: #ff1493;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
        }
        
        #avatarFileInput {
            display: none;
        }
        
        @media (max-width: 768px) {
            .profile-container { padding: 1rem; margin: 1rem; }
            .info-row { flex-direction: column; }
            .info-label { width: 100%; }
            .stats-grid { grid-template-columns: 1fr; gap: 0.5rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">Honestly, it.....</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="reviews.html">Reviews</a></li>
                <li><a href="community.html">Community</a></li>
            </ul>
            <div class="user-menu">
                <div id="authButtons">
                    <button id="signInBtn" class="auth-nav-btn">Sign In</button>
                    <button id="signUpBtn" class="auth-nav-btn-primary">Sign Up</button>
                </div>
                <div id="userAvatarContainer" style="display: none;">
                    <button id="userAvatarBtn" class="user-avatar-btn" onclick="toggleUserDropdown()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z" fill="white"/>
                        </svg>
                    </button>
                    <div id="userDropdown" class="user-dropdown" style="display: none;">
                        <div class="user-dropdown-email" id="userEmailDisplay"></div>
                        <a href="profile.html" class="user-dropdown-item">My Profile</a>
                        <a href="settings.html" class="user-dropdown-item">Settings</a>
                        <div class="dropdown-divider"></div>
                        <button id="signOutBtn" class="user-dropdown-item" style="color: #ff1493;">Sign Out</button>
                    </div>
                </div>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 12H21M3 6H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </nav>

    <div class="mobile-nav-overlay" id="mobileNavOverlay"></div>
    <div class="mobile-nav-menu" id="mobileNavMenu">
        <div class="mobile-nav-header">
            <span class="logo-text">Menu</span>
            <button class="mobile-nav-close" id="mobileNavClose">×</button>
        </div>
        <ul class="mobile-nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="reviews.html">Reviews</a></li>
            <li><a href="community.html">Community</a></li>
        </ul>
        <div id="mobileAuthContainer"></div>
    </div>

    <div class="container">
        <div id="profileContent" class="profile-container">
            <div style="text-align: center; padding: 3rem;">Loading profile...</div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-bottom">
                <p>&copy; 2026 Honestly, it..... All rights reserved.</p>
            </div>
        </div>
    </footer>

    <input type="file" id="avatarFileInput" accept="image/*">

    <div id="authModal" class="auth-modal-overlay">
        <div class="auth-modal">
            <div class="auth-modal-header">
                <h2 id="authModalTitle">Welcome Back</h2>
                <span class="auth-close" id="closeAuthModalBtn">&times;</span>
            </div>
            <div class="auth-modal-body" id="authModalBody"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile, updateEmail, updatePassword, reauthenticateWithCredential, EmailAuthProvider, deleteUser, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyArSLD6TCMLWGo9uPb_IqwiOr_tkhDe1ag",
  authDomain: "honestly-it.firebaseapp.com",
  projectId: "honestly-it",
  storageBucket: "honestly-it.firebasestorage.app",
  messagingSenderId: "938783642355",
  appId: "1:938783642355:web:330ad714c0f79b7eb25d86",
  measurementId: "G-R8Q5308Y8K"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Mobile Navigation
        function initMobileNav() {
            const menuBtn = document.getElementById('mobileMenuBtn');
            const navOverlay = document.getElementById('mobileNavOverlay');
            const navMenu = document.getElementById('mobileNavMenu');
            const navClose = document.getElementById('mobileNavClose');
            if (!menuBtn) return;
            function openMenu() { navMenu.classList.add('open'); navOverlay.style.display = 'block'; document.body.style.overflow = 'hidden'; }
            function closeMenu() { navMenu.classList.remove('open'); navOverlay.style.display = 'none'; document.body.style.overflow = ''; }
            menuBtn.addEventListener('click', openMenu);
            navClose.addEventListener('click', closeMenu);
            navOverlay.addEventListener('click', closeMenu);
            document.querySelectorAll('.mobile-nav-links a').forEach(link => link.addEventListener('click', closeMenu));
        }

        function updateMobileAuth(user) {
            const mobileAuthContainer = document.getElementById('mobileAuthContainer');
            if (!mobileAuthContainer) return;
            if (user) {
                const displayName = user.displayName || user.email.split('@')[0];
                const avatarLetter = displayName.charAt(0).toUpperCase();
                mobileAuthContainer.innerHTML = `
                    <div class="mobile-user-info">
                        <div class="mobile-user-avatar">${avatarLetter}</div>
                        <div class="mobile-user-details">
                            <div class="mobile-user-name">${escapeHtml(displayName)}</div>
                            <div class="mobile-user-email">${escapeHtml(user.email)}</div>
                        </div>
                        <button class="mobile-logout-btn" id="mobileSignOutBtn">Sign Out</button>
                    </div>
                `;
                document.getElementById('mobileSignOutBtn')?.addEventListener('click', () => { signOut(auth); closeMobileMenu(); });
            } else {
                mobileAuthContainer.innerHTML = `
                    <div class="mobile-auth-buttons">
                        <button class="mobile-signin-btn" id="mobileSignInBtn">Sign In</button>
                        <button class="mobile-signup-btn" id="mobileSignUpBtn">Create Account</button>
                    </div>
                `;
                document.getElementById('mobileSignInBtn')?.addEventListener('click', () => showAuthModal('login'));
                document.getElementById('mobileSignUpBtn')?.addEventListener('click', () => showAuthModal('signup'));
            }
        }

        function closeMobileMenu() {
            const navMenu = document.getElementById('mobileNavMenu');
            const navOverlay = document.getElementById('mobileNavOverlay');
            if (navMenu) navMenu.classList.remove('open');
            if (navOverlay) navOverlay.style.display = 'none';
            document.body.style.overflow = '';
        }

        // Auth Modal
        function showAuthModal(type) {
            const modal = document.getElementById('authModal');
            const title = document.getElementById('authModalTitle');
            const body = document.getElementById('authModalBody');
            if (type === 'login') {
                title.innerHTML = 'Welcome Back';
                body.innerHTML = `
                    <div id="loginError" class="auth-error" style="display: none;"></div>
                    <div class="auth-input-group"><input type="email" id="loginEmail" class="auth-input" placeholder="Email address"></div>
                    <div class="auth-input-group"><input type="password" id="loginPassword" class="auth-input" placeholder="Password"></div>
                    <button id="doLoginBtn" class="auth-btn-primary">Sign In</button>
                    <div class="auth-divider"><span>or</span></div>
                    <div class="auth-switch">New here? <a id="switchToSignup">Create an account</a></div>
                    <div class="auth-switch"><a id="forgotPasswordLink">Forgot password?</a></div>
                `;
                document.getElementById('doLoginBtn')?.addEventListener('click', handleLogin);
                document.getElementById('switchToSignup')?.addEventListener('click', () => showAuthModal('signup'));
                document.getElementById('forgotPasswordLink')?.addEventListener('click', showForgotPassword);
            } else {
                title.innerHTML = 'Create Account';
                body.innerHTML = `
                    <div id="signupError" class="auth-error" style="display: none;"></div>
                    <div class="auth-input-group"><input type="text" id="signupName" class="auth-input" placeholder="Display name"></div>
                    <div class="auth-input-group"><input type="email" id="signupEmail" class="auth-input" placeholder="Email address"></div>
                    <div class="auth-input-group"><input type="password" id="signupPassword" class="auth-input" placeholder="Password (min 6 characters)"></div>
                    <button id="doSignupBtn" class="auth-btn-primary">Create Account</button>
                    <div class="auth-divider"><span>or</span></div>
                    <div class="auth-switch">Already have an account? <a id="switchToLogin">Sign In</a></div>
                `;
                document.getElementById('doSignupBtn')?.addEventListener('click', handleSignup);
                document.getElementById('switchToLogin')?.addEventListener('click', () => showAuthModal('login'));
            }
            modal.style.display = 'flex';
        }

        function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }

        async function handleLogin() {
            const email = document.getElementById('loginEmail')?.value;
            const password = document.getElementById('loginPassword')?.value;
            const errorDiv = document.getElementById('loginError');
            if (!email || !password) { errorDiv.style.display = 'block'; errorDiv.textContent = 'Please enter both email and password'; return; }
            errorDiv.style.display = 'none';
            try { await signInWithEmailAndPassword(auth, email, password); closeAuthModal(); } 
            catch (error) { errorDiv.style.display = 'block'; errorDiv.textContent = error.message; }
        }

        async function handleSignup() {
            const name = document.getElementById('signupName')?.value;
            const email = document.getElementById('signupEmail')?.value;
            const password = document.getElementById('signupPassword')?.value;
            const errorDiv = document.getElementById('signupError');
            if (!name || !email || !password) { errorDiv.style.display = 'block'; errorDiv.textContent = 'Please fill in all fields'; return; }
            if (password.length < 6) { errorDiv.style.display = 'block'; errorDiv.textContent = 'Password must be at least 6 characters'; return; }
            errorDiv.style.display = 'none';
            try { const userCredential = await createUserWithEmailAndPassword(auth, email, password); await updateProfile(userCredential.user, { displayName: name }); closeAuthModal(); } 
            catch (error) { errorDiv.style.display = 'block'; errorDiv.textContent = error.message; }
        }

        async function showForgotPassword() {
            const title = document.getElementById('authModalTitle');
            const body = document.getElementById('authModalBody');
            title.innerHTML = 'Reset Password';
            body.innerHTML = `
                <div id="resetError" class="auth-error" style="display: none;"></div>
                <p>Enter your email to receive a reset link.</p>
                <div class="auth-input-group"><input type="email" id="resetEmail" class="auth-input" placeholder="Email address"></div>
                <button id="sendResetBtn" class="auth-btn-primary">Send Reset Link</button>
                <div class="auth-switch"><a id="backToLogin">Back to Sign In</a></div>
            `;
            document.getElementById('sendResetBtn')?.addEventListener('click', async () => {
                const email = document.getElementById('resetEmail')?.value;
                const errorDiv = document.getElementById('resetError');
                if (!email) { errorDiv.style.display = 'block'; errorDiv.textContent = 'Please enter your email'; return; }
                try { await sendPasswordResetEmail(auth, email); errorDiv.style.display = 'block'; errorDiv.textContent = `Reset email sent to ${email}!`; setTimeout(() => closeAuthModal(), 3000); } 
                catch (error) { errorDiv.style.display = 'block'; errorDiv.textContent = error.message; }
            });
            document.getElementById('backToLogin')?.addEventListener('click', () => showAuthModal('login'));
        }

        let currentUser = null;
        let userData = {};

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function uploadAvatarFromDevice(user) {
            const fileInput = document.getElementById('avatarFileInput');
            fileInput.click();
            fileInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 2 * 1024 * 1024) { alert('Image must be less than 2MB'); return; }
                if (!file.type.startsWith('image/')) { alert('Please select an image file'); return; }
                try {
                    const base64Image = await fileToBase64(file);
                    localStorage.setItem(`avatar_${user.uid}`, base64Image);
                    try { await updateProfile(user, { photoURL: base64Image }); } catch(e) {}
                    showMessage('Profile picture updated!', 'success');
                    renderProfile(user, userData);
                } catch (error) { showMessage('Error uploading image', 'error'); }
                fileInput.value = '';
            };
        }

        async function loadUserData(userId) {
            const userDocRef = doc(db, 'users', userId);
            const userDoc = await getDoc(userDocRef);
            if (userDoc.exists()) userData = userDoc.data();
            else { userData = { favoriteGenres: [] }; await setDoc(userDocRef, userData); }
            return userData;
        }

        async function saveUserData(userId, data) {
            const userDocRef = doc(db, 'users', userId);
            await updateDoc(userDocRef, data);
        }

        function getAvatarImage(user) {
            const localAvatar = localStorage.getItem(`avatar_${user.uid}`);
            if (localAvatar) return localAvatar;
            if (user.photoURL && user.photoURL.startsWith('http')) return user.photoURL;
            return null;
        }

        async function getUserCommentCount(userId) {
            let commentCount = 0;
            try {
                const stored = localStorage.getItem('musicReviews');
                if (stored) {
                    const reviews = JSON.parse(stored);
                    for (const review of reviews) {
                        const commentsRef = collection(db, 'reviews', review.firebaseId || String(review.id), 'comments');
                        const q = query(commentsRef, where('userId', '==', userId));
                        const commentSnapshot = await getDocs(q);
                        commentCount += commentSnapshot.size;
                    }
                }
            } catch (error) { console.error('Error counting comments:', error); }
            return commentCount;
        }

        async function renderProfile(user, userData) {
            const container = document.getElementById('profileContent');
            const displayName = user.displayName || user.email.split('@')[0];
            const avatarImage = getAvatarImage(user);
            const memberSince = new Date(user.metadata.creationTime).toLocaleDateString();
            const favoriteGenres = userData.favoriteGenres || [];
            const commentCount = await getUserCommentCount(user.uid);
            
            container.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar" id="avatarContainer">
                        <div class="profile-avatar-img" id="avatarPreview">${avatarImage ? `<img src="${avatarImage}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : displayName.charAt(0).toUpperCase()}</div>
                        <div class="avatar-overlay">📷</div>
                    </div>
                    <h2 class="profile-name">${escapeHtml(displayName)}</h2>
                    <p class="profile-email">${escapeHtml(user.email)}</p>
                    <p class="profile-member-since">Member since ${memberSince}</p>
                </div>
                
                <div class="profile-section">
                    <div class="section-title">📝 Profile Information</div>
                    <div id="nameField">
                        <div class="info-row"><div class="info-label">Display Name</div><div class="info-value" id="nameValue">${escapeHtml(displayName)}</div><button class="edit-btn" id="editNameBtn">Edit</button></div>
                    </div>
                    <div id="emailField">
                        <div class="info-row"><div class="info-label">Email Address</div><div class="info-value" id="emailValue">${escapeHtml(user.email)}</div><button class="edit-btn" id="editEmailBtn">Edit</button></div>
                    </div>
                    <div id="passwordField">
                        <div class="info-row"><div class="info-label">Password</div><div class="info-value">••••••••</div><button class="edit-btn" id="editPasswordBtn">Change</button></div>
                    </div>
                </div>
                
                <div class="profile-section">
                    <div class="section-title">🎵 Favorite Genres</div>
                    <div id="genresContainer" class="genre-grid"></div>
                    <div id="selectedGenresDisplay" class="selected-genres"></div>
                    <button id="saveGenresBtn" class="save-genres-btn">Save Genre Preferences</button>
                </div>
                
                <div class="profile-section">
                    <div class="section-title">📊 Your Activity</div>
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-number" id="commentCount">${commentCount}</div><div class="stat-label">Comments Posted</div></div>
                        <div class="stat-card"><div class="stat-number">0</div><div class="stat-label">Reviews Written</div></div>
                        <div class="stat-card"><div class="stat-number">0</div><div class="stat-label">Favorite Albums</div></div>
                    </div>
                </div>
                
                <div class="danger-zone">
                    <h3>⚠️ Danger Zone</h3>
                    <p>Once you delete your account, there is no going back. All your data will be permanently removed.</p>
                    <button id="deleteAccountBtn" class="delete-account-btn">Delete Account</button>
                </div>
            `;
            
            const genresGrid = document.getElementById('genresContainer');
            const allGenres = ["Rock", "Pop", "Hip Hop", "Electronic", "R&B", "Jazz", "Country", "Metal", "Classical", "K-Pop", "Latin", "Indie", "Alternative", "Folk", "Blues", "Reggae", "Soul", "Funk", "Punk", "House", "Techno", "Ambient", "Lo-Fi", "Disco"];
            genresGrid.innerHTML = allGenres.map(genre => `
                <label class="genre-checkbox">
                    <input type="checkbox" value="${genre}" ${favoriteGenres.includes(genre) ? 'checked' : ''} onchange="updateGenreSelection()">
                    <span>${genre}</span>
                </label>
            `).join('');
            
            window.updateGenreSelection = function() {
                const selected = Array.from(document.querySelectorAll('#genresContainer input:checked')).map(cb => cb.value);
                document.getElementById('selectedGenresDisplay').innerHTML = selected.map(g => `<span class="genre-tag">${g}</span>`).join('');
            };
            window.updateGenreSelection();
            
            document.getElementById('avatarContainer')?.addEventListener('click', () => uploadAvatarFromDevice(user));
            document.getElementById('editNameBtn')?.addEventListener('click', () => showEditName(user));
            document.getElementById('editEmailBtn')?.addEventListener('click', () => showEditEmail(user));
            document.getElementById('editPasswordBtn')?.addEventListener('click', () => showEditPassword());
            document.getElementById('saveGenresBtn')?.addEventListener('click', () => saveGenres(user.uid));
            document.getElementById('deleteAccountBtn')?.addEventListener('click', () => confirmDeleteAccount(user));
        }
        
        async function saveGenres(userId) {
            const selected = Array.from(document.querySelectorAll('#genresContainer input:checked')).map(cb => cb.value);
            try { await saveUserData(userId, { favoriteGenres: selected }); showMessage('Genre preferences saved!', 'success'); }
            catch (error) { showMessage('Error saving genres', 'error'); }
        }
        
        function showMessage(message, type) {
            const container = document.getElementById('profileContent');
            const msgDiv = document.createElement('div');
            msgDiv.textContent = message;
            msgDiv.style.cssText = `padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; background: ${type === 'success' ? 'rgba(40,167,69,0.2)' : 'rgba(255,20,147,0.2)'}; color: ${type === 'success' ? '#28a745' : '#ff1493'};`;
            container.insertBefore(msgDiv, container.firstChild);
            setTimeout(() => msgDiv.remove(), 3000);
        }
        
        function showEditName(user) {
            const nameField = document.getElementById('nameField');
            nameField.innerHTML = `<div class="info-row"><div class="info-label">Display Name</div><div class="info-value"><input type="text" id="newName" class="edit-input" value="${user.displayName || ''}"></div><div><button class="save-btn" id="saveNameBtn">Save</button><button class="cancel-btn" id="cancelNameBtn">Cancel</button></div></div>`;
            document.getElementById('saveNameBtn')?.addEventListener('click', async () => {
                const newName = document.getElementById('newName').value;
                try { await updateProfile(user, { displayName: newName }); showMessage('Display name updated!', 'success'); renderProfile(user, userData); }
                catch (error) { showMessage('Error: ' + error.message, 'error'); }
            });
            document.getElementById('cancelNameBtn')?.addEventListener('click', () => renderProfile(user, userData));
        }
        
        function showEditEmail(user) {
            const emailField = document.getElementById('emailField');
            emailField.innerHTML = `<div class="info-row"><div class="info-label">Email Address</div><div class="info-value"><input type="email" id="newEmail" class="edit-input" value="${user.email}"><input type="password" id="emailPassword" class="edit-input" placeholder="Current password" style="margin-top: 0.5rem;"></div><div><button class="save-btn" id="saveEmailBtn">Save</button><button class="cancel-btn" id="cancelEmailBtn">Cancel</button></div></div>`;
            document.getElementById('saveEmailBtn')?.addEventListener('click', async () => {
                const newEmail = document.getElementById('newEmail').value;
                const password = document.getElementById('emailPassword').value;
                try {
                    const credential = EmailAuthProvider.credential(user.email, password);
                    await reauthenticateWithCredential(user, credential);
                    await updateEmail(user, newEmail);
                    showMessage('Email updated! Please sign in again.', 'success');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } catch (error) { showMessage('Error: ' + error.message, 'error'); }
            });
            document.getElementById('cancelEmailBtn')?.addEventListener('click', () => renderProfile(user, userData));
        }
        
        function showEditPassword() {
            const passwordField = document.getElementById('passwordField');
            passwordField.innerHTML = `<div class="info-row"><div class="info-label">Change Password</div><div class="info-value"><input type="password" id="currentPwd" class="edit-input" placeholder="Current password"><input type="password" id="newPwd" class="edit-input" placeholder="New password (min 6 chars)" style="margin-top: 0.5rem;"><input type="password" id="confirmPwd" class="edit-input" placeholder="Confirm new password" style="margin-top: 0.5rem;"></div><div><button class="save-btn" id="savePasswordBtn">Save</button><button class="cancel-btn" id="cancelPasswordBtn">Cancel</button></div></div>`;
            document.getElementById('savePasswordBtn')?.addEventListener('click', async () => {
                const currentPwd = document.getElementById('currentPwd').value;
                const newPwd = document.getElementById('newPwd').value;
                const confirmPwd = document.getElementById('confirmPwd').value;
                if (newPwd !== confirmPwd) { showMessage('New passwords do not match', 'error'); return; }
                if (newPwd.length < 6) { showMessage('Password must be at least 6 characters', 'error'); return; }
                try {
                    const user = auth.currentUser;
                    const credential = EmailAuthProvider.credential(user.email, currentPwd);
                    await reauthenticateWithCredential(user, credential);
                    await updatePassword(user, newPwd);
                    showMessage('Password updated successfully!', 'success');
                    renderProfile(user, userData);
                } catch (error) { showMessage('Error: ' + error.message, 'error'); }
            });
            document.getElementById('cancelPasswordBtn')?.addEventListener('click', () => renderProfile(auth.currentUser, userData));
        }
        
        async function confirmDeleteAccount(user) {
            const password = prompt('⚠️ WARNING: This will permanently delete your account. Enter your password to confirm:');
            if (password) {
                try {
                    const credential = EmailAuthProvider.credential(user.email, password);
                    await reauthenticateWithCredential(user, credential);
                    localStorage.removeItem(`avatar_${user.uid}`);
                    await deleteUser(user);
                    alert('Account deleted successfully.');
                    window.location.href = 'index.html';
                } catch (error) { showMessage('Error: ' + error.message, 'error'); }
            }
        }
        
        window.toggleUserDropdown = function() {
            const dropdown = document.getElementById('userDropdown');
            if (dropdown) dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        };
        
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                document.getElementById('profileContent').innerHTML = `<div style="text-align: center; padding: 3rem;"><h2>Please Sign In</h2><p>You need to be signed in to view your profile.</p><a href="index.html" style="display: inline-block; margin-top: 1rem; padding: 0.5rem 1rem; background: #ff1493; color: white; text-decoration: none; border-radius: 8px;">← Back to Home</a></div>`;
                return;
            }
            currentUser = user;
            await loadUserData(user.uid);
            await renderProfile(user, userData);
            updateMobileAuth(user);
        });
        
        document.getElementById('signOutBtn')?.addEventListener('click', async () => { await signOut(auth); window.location.href = 'index.html'; });
        document.getElementById('signInBtn')?.addEventListener('click', () => showAuthModal('login'));
        document.getElementById('signUpBtn')?.addEventListener('click', () => showAuthModal('signup'));
        document.getElementById('closeAuthModalBtn')?.addEventListener('click', closeAuthModal);
        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('userDropdown');
            const avatarBtn = document.getElementById('userAvatarBtn');
            if (dropdown && avatarBtn && !avatarBtn.contains(e.target) && !dropdown.contains(e.target)) dropdown.style.display = 'none';
            if (e.target === document.getElementById('authModal')) closeAuthModal();
        });
        
        initMobileNav();
    </script>
</body>
</html>
