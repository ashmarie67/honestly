<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>My Profile - Honestly, it.....</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
        }
        
        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid var(--border-color);
        }
        
        .profile-avatar {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 1rem;
            cursor: pointer;
        }
        
        .profile-avatar-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, #ff1493, #ffd700);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            transition: opacity 0.2s;
        }
        
        .profile-avatar:hover .profile-avatar-img {
            opacity: 0.8;
        }
        
        .avatar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            color: white;
            font-size: 1.5rem;
        }
        
        .profile-avatar:hover .avatar-overlay {
            opacity: 1;
        }
        
        .profile-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0.5rem 0 0.25rem;
        }
        
        .profile-email {
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        
        .profile-member-since {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        .profile-section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: var(--bg-secondary);
            border-radius: 16px;
        }
        
        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            color: #ff1493;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .section-title svg {
            width: 20px;
            height: 20px;
        }
        
        .info-row {
            display: flex;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .info-label {
            width: 120px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        
        .info-value {
            flex: 1;
            color: var(--text-primary);
        }
        
        .edit-btn {
            background: linear-gradient(135deg, #ff1493, #ffd700);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        
        .edit-btn:hover, .save-btn:hover, .cancel-btn:hover {
            transform: translateY(-2px);
        }
        
        .save-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 0.5rem;
        }
        
        .cancel-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .edit-input {
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            width: 100%;
            max-width: 300px;
        }
        
        .genre-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 0.75rem;
            margin-top: 1rem;
        }
        
        .genre-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            padding: 0.5rem;
            background: var(--bg-primary);
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .genre-checkbox:hover {
            background: rgba(255, 20, 147, 0.1);
        }
        
        .genre-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #ff1493;
        }
        
        .genre-checkbox span {
            font-size: 0.85rem;
        }
        
        .selected-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .genre-tag {
            background: linear-gradient(135deg, #ff1493, #ffd700);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        .save-genres-btn {
            margin-top: 1rem;
            background: #28a745;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .stat-card {
            text-align: center;
            padding: 1rem;
            background: var(--bg-primary);
            border-radius: 12px;
        }
        
        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd700;
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
        
        .danger-zone {
            background: rgba(255, 20, 147, 0.1);
            border: 1px solid #ff1493;
            border-radius: 16px;
            padding: 1.5rem;
            margin-top: 1rem;
        }
        
        .danger-zone h3 {
            color: #ff1493;
            margin-bottom: 1rem;
        }
        
        .delete-account-btn {
            background: #ff1493;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .hidden {
            display: none;
        }
        
        .message {
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        
        .message.success {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid #28a745;
            color: #28a745;
        }
        
        .message.error {
            background: rgba(255, 20, 147, 0.2);
            border: 1px solid #ff1493;
            color: #ff1493;
        }
        
        #avatarFileInput {
            display: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">Honestly, it.....</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>

                <li><a href="settings.html">Settings</a></li>
            </ul>

    <div class="container">
        <div id="profileContent" class="profile-container">
            <div style="text-align: center; padding: 3rem;">Loading profile...</div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-bottom">
                <p>&copy; 2024 Honestly, it..... All rights reserved.</p>
            </div>
        </div>
    </footer>

    <input type="file" id="avatarFileInput" accept="image/*">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, updateProfile, updateEmail, updatePassword, reauthenticateWithCredential, EmailAuthProvider, deleteUser } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // REPLACE WITH YOUR FIREBASE CONFIG
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyArSLD6TCMLWGo9uPb_IqwiOr_tkhDe1ag",
  authDomain: "honestly-it.firebaseapp.com",
  projectId: "honestly-it",
  storageBucket: "honestly-it.firebasestorage.app",
  messagingSenderId: "938783642355",
  appId: "1:938783642355:web:330ad714c0f79b7eb25d86",
  measurementId: "G-R8Q5308Y8K"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const allGenres = [
            "Rock", "Pop", "Hip Hop", "Electronic", "R&B", "Jazz", 
            "Alternative", "Indie", "Ballad", "Classical", "Country", 
            "Blues", "Folk", "Metal", "Punk", "Soul", "Funk", "Reggae", 
            "Latin", "K-Pop", "Disco", "House", "Techno", "Lo-Fi"
        ];

        let currentUser = null;
        let userData = {};

        function showMessage(message, type) {
            const container = document.getElementById('profileContent');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = message;
            msgDiv.style.display = 'block';
            const firstChild = container.firstChild;
            container.insertBefore(msgDiv, firstChild);
            setTimeout(() => msgDiv.remove(), 3000);
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function uploadAvatarFromDevice(user) {
            const fileInput = document.getElementById('avatarFileInput');
            fileInput.click();
            
            fileInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                if (file.size > 2 * 1024 * 1024) {
                    showMessage('Image size must be less than 2MB', 'error');
                    return;
                }
                
                if (!file.type.startsWith('image/')) {
                    showMessage('Please select an image file', 'error');
                    return;
                }
                
                try {
                    const base64Image = await fileToBase64(file);
                    localStorage.setItem(`avatar_${user.uid}`, base64Image);
                    
                    try {
                        await updateProfile(user, { photoURL: base64Image });
                    } catch (error) {
                        console.log('Could not save to Firebase, using localStorage only');
                    }
                    
                    showMessage('Profile picture updated successfully!', 'success');
                    const updatedUser = auth.currentUser;
                    await loadUserData(updatedUser.uid);
                    renderProfile(updatedUser, userData);
                } catch (error) {
                    showMessage('Error uploading image: ' + error.message, 'error');
                }
                
                fileInput.value = '';
            };
        }

        async function loadUserData(userId) {
            const userDocRef = doc(db, 'users', userId);
            const userDoc = await getDoc(userDocRef);
            if (userDoc.exists()) {
                userData = userDoc.data();
            } else {
                userData = { favoriteGenres: [] };
                await setDoc(userDocRef, userData);
            }
            return userData;
        }

        async function saveUserData(userId, data) {
            const userDocRef = doc(db, 'users', userId);
            await updateDoc(userDocRef, data);
        }

        function getAvatarImage(user) {
            const localAvatar = localStorage.getItem(`avatar_${user.uid}`);
            if (localAvatar) {
                return localAvatar;
            }
            if (user.photoURL && user.photoURL.startsWith('http')) {
                return user.photoURL;
            }
            return null;
        }

        // Get user's comment count from Firebase
        async function getUserCommentCount(userId) {
            let commentCount = 0;
            try {
                // Get all reviews from localStorage
                const stored = localStorage.getItem('musicReviews');
                if (stored) {
                    const reviews = JSON.parse(stored);
                    // For each review, query its comments subcollection
                    for (const review of reviews) {
                        const commentsRef = collection(db, 'reviews', String(review.id), 'comments');
                        const q = query(commentsRef, where('userId', '==', userId));
                        const commentSnapshot = await getDocs(q);
                        commentCount += commentSnapshot.size;
                    }
                }
            } catch (error) {
                console.error('Error counting comments:', error);
            }
            return commentCount;
        }

        async function renderProfile(user, userData) {
            const container = document.getElementById('profileContent');
            const displayName = user.displayName || user.email.split('@')[0];
            const avatarImage = getAvatarImage(user);
            const memberSince = new Date(user.metadata.creationTime).toLocaleDateString();
            const favoriteGenres = userData.favoriteGenres || [];
            
            // Get real comment count
            const commentCount = await getUserCommentCount(user.uid);
            
            container.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar" id="avatarContainer">
                        <div class="profile-avatar-img" id="avatarPreview">
                            ${avatarImage ? `<img src="${avatarImage}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : displayName.charAt(0).toUpperCase()}
                        </div>
                        <div class="avatar-overlay">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M3 17.25V21H6.75L17.81 9.94L14.06 6.19L3 17.25ZM20.71 7.04C21.1 6.65 21.1 6.02 20.71 5.63L18.37 3.29C17.98 2.9 17.35 2.9 16.96 3.29L15.13 5.12L18.88 8.87L20.71 7.04Z" fill="white"/>
                            </svg>
                        </div>
                    </div>
                    <h2 class="profile-name" id="displayName">${escapeHtml(displayName)}</h2>
                    <p class="profile-email">${escapeHtml(user.email)}</p>
                    <p class="profile-member-since">Member since ${memberSince}</p>
                </div>
                
                <div class="profile-section">
                    <div class="section-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z" fill="#ff1493"/>
                        </svg>
                        Profile Information
                    </div>
                    <div id="nameField">
                        <div class="info-row">
                            <div class="info-label">Display Name</div>
                            <div class="info-value" id="nameValue">${escapeHtml(displayName)}</div>
                            <button class="edit-btn" id="editNameBtn">Edit</button>
                        </div>
                    </div>
                    <div id="emailField">
                        <div class="info-row">
                            <div class="info-label">Email Address</div>
                            <div class="info-value" id="emailValue">${escapeHtml(user.email)}</div>
                            <button class="edit-btn" id="editEmailBtn">Edit</button>
                        </div>
                    </div>
                    <div id="passwordField">
                        <div class="info-row">
                            <div class="info-label">Password</div>
                            <div class="info-value">••••••••</div>
                            <button class="edit-btn" id="editPasswordBtn">Change</button>
                        </div>
                    </div>
                </div>
                
                <div class="profile-section">
                    <div class="section-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 20C7.58 20 4 16.42 4 12C4 7.58 7.58 4 12 4C16.42 4 20 7.58 20 12C20 16.42 16.42 20 12 20Z" fill="#ff1493"/>
                            <path d="M12 17.27L18.18 21L16.54 13.97L22 9.24L14.81 8.63L12 2L9.19 8.63L2 9.24L7.46 13.97L5.82 21L12 17.27Z" fill="#ffd700"/>
                        </svg>
                        Favorite Genres
                    </div>
                    <p style="margin-bottom: 1rem; color: var(--text-muted);">Select the genres you love to get personalized recommendations</p>
                    <div id="genresContainer" class="genre-grid"></div>
                    <div id="selectedGenresDisplay" class="selected-genres"></div>
                    <button id="saveGenresBtn" class="save-genres-btn">Save Genre Preferences</button>
                </div>
                
                <div class="profile-section">
                    <div class="section-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M3 13H8L12 17L16 13H21" stroke="#ff1493" stroke-width="2" fill="none"/>
                            <path d="M12 17V3" stroke="#ff1493" stroke-width="2"/>
                            <circle cx="12" cy="12" r="10" stroke="#ff1493" stroke-width="2" fill="none"/>
                        </svg>
                        Your Activity
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number" id="commentCount">${commentCount}</div>
                            <div class="stat-label">Comments Posted</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="reviewCount">0</div>
                            <div class="stat-label">Reviews Written</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="favCount">0</div>
                            <div class="stat-label">Favorite Albums</div>
                        </div>
                    </div>
                </div>
                
                <div class="danger-zone">
                    <h3>⚠️ Danger Zone</h3>
                    <p style="margin-bottom: 1rem;">Once you delete your account, there is no going back. All your data will be permanently removed.</p>
                    <button id="deleteAccountBtn" class="delete-account-btn">Delete Account</button>
                </div>
            `;
            
            // Render genre checkboxes
            const genresContainer = document.getElementById('genresContainer');
            allGenres.forEach(genre => {
                const isChecked = favoriteGenres.includes(genre);
                genresContainer.innerHTML += `
                    <label class="genre-checkbox">
                        <input type="checkbox" value="${genre}" ${isChecked ? 'checked' : ''}>
                        <span>${genre}</span>
                    </label>
                `;
            });
            
            updateSelectedGenresDisplay();
            
            document.getElementById('avatarContainer')?.addEventListener('click', () => uploadAvatarFromDevice(user));
            document.getElementById('editNameBtn')?.addEventListener('click', () => showEditName(user));
            document.getElementById('editEmailBtn')?.addEventListener('click', () => showEditEmail(user));
            document.getElementById('editPasswordBtn')?.addEventListener('click', () => showEditPassword());
            document.getElementById('saveGenresBtn')?.addEventListener('click', () => saveGenres(user.uid));
            document.getElementById('deleteAccountBtn')?.addEventListener('click', () => confirmDeleteAccount(user));
            
            document.querySelectorAll('#genresContainer input').forEach(cb => {
                cb.addEventListener('change', () => updateSelectedGenresDisplay());
            });
        }
        
        function updateSelectedGenresDisplay() {
            const selected = [];
            document.querySelectorAll('#genresContainer input:checked').forEach(cb => {
                selected.push(cb.value);
            });
            const display = document.getElementById('selectedGenresDisplay');
            if (display) {
                display.innerHTML = selected.map(g => `<span class="genre-tag">${g}</span>`).join('');
            }
        }
        
        async function saveGenres(userId) {
            const selected = [];
            document.querySelectorAll('#genresContainer input:checked').forEach(cb => {
                selected.push(cb.value);
            });
            try {
                await saveUserData(userId, { favoriteGenres: selected });
                showMessage('Genre preferences saved!', 'success');
            } catch (error) {
                showMessage('Error saving genres: ' + error.message, 'error');
            }
        }
        
        function showEditName(user) {
            const nameField = document.getElementById('nameField');
            nameField.innerHTML = `
                <div class="info-row">
                    <div class="info-label">Display Name</div>
                    <div class="info-value">
                        <input type="text" id="newName" class="edit-input" value="${user.displayName || ''}">
                    </div>
                    <div>
                        <button class="save-btn" id="saveNameBtn">Save</button>
                        <button class="cancel-btn" id="cancelNameBtn">Cancel</button>
                    </div>
                </div>
            `;
            document.getElementById('saveNameBtn')?.addEventListener('click', async () => {
                const newName = document.getElementById('newName').value;
                try {
                    await updateProfile(user, { displayName: newName });
                    showMessage('Display name updated!', 'success');
                    renderProfile(user, userData);
                } catch (error) {
                    showMessage('Error: ' + error.message, 'error');
                }
            });
            document.getElementById('cancelNameBtn')?.addEventListener('click', () => renderProfile(user, userData));
        }
        
        function showEditEmail(user) {
            const emailField = document.getElementById('emailField');
            emailField.innerHTML = `
                <div class="info-row">
                    <div class="info-label">Email Address</div>
                    <div class="info-value">
                        <input type="email" id="newEmail" class="edit-input" value="${user.email}">
                        <input type="password" id="emailPassword" class="edit-input" placeholder="Current password" style="margin-top: 0.5rem;">
                    </div>
                    <div>
                        <button class="save-btn" id="saveEmailBtn">Save</button>
                        <button class="cancel-btn" id="cancelEmailBtn">Cancel</button>
                    </div>
                </div>
            `;
            document.getElementById('saveEmailBtn')?.addEventListener('click', async () => {
                const newEmail = document.getElementById('newEmail').value;
                const password = document.getElementById('emailPassword').value;
                try {
                    const credential = EmailAuthProvider.credential(user.email, password);
                    await reauthenticateWithCredential(user, credential);
                    await updateEmail(user, newEmail);
                    showMessage('Email updated! Please sign in again.', 'success');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } catch (error) {
                    showMessage('Error: ' + error.message, 'error');
                }
            });
            document.getElementById('cancelEmailBtn')?.addEventListener('click', () => renderProfile(user, userData));
        }
        
        function showEditPassword() {
            const passwordField = document.getElementById('passwordField');
            passwordField.innerHTML = `
                <div class="info-row">
                    <div class="info-label">Change Password</div>
                    <div class="info-value">
                        <input type="password" id="currentPwd" class="edit-input" placeholder="Current password">
                        <input type="password" id="newPwd" class="edit-input" placeholder="New password (min 6 chars)" style="margin-top: 0.5rem;">
                        <input type="password" id="confirmPwd" class="edit-input" placeholder="Confirm new password" style="margin-top: 0.5rem;">
                    </div>
                    <div>
                        <button class="save-btn" id="savePasswordBtn">Save</button>
                        <button class="cancel-btn" id="cancelPasswordBtn">Cancel</button>
                    </div>
                </div>
            `;
            document.getElementById('savePasswordBtn')?.addEventListener('click', async () => {
                const currentPwd = document.getElementById('currentPwd').value;
                const newPwd = document.getElementById('newPwd').value;
                const confirmPwd = document.getElementById('confirmPwd').value;
                
                if (newPwd !== confirmPwd) {
                    showMessage('New passwords do not match', 'error');
                    return;
                }
                if (newPwd.length < 6) {
                    showMessage('Password must be at least 6 characters', 'error');
                    return;
                }
                
                try {
                    const user = auth.currentUser;
                    const credential = EmailAuthProvider.credential(user.email, currentPwd);
                    await reauthenticateWithCredential(user, credential);
                    await updatePassword(user, newPwd);
                    showMessage('Password updated successfully!', 'success');
                    renderProfile(user, userData);
                } catch (error) {
                    showMessage('Error: ' + error.message, 'error');
                }
            });
            document.getElementById('cancelPasswordBtn')?.addEventListener('click', () => renderProfile(auth.currentUser, userData));
        }
        
        async function confirmDeleteAccount(user) {
            const password = prompt('⚠️ WARNING: This will permanently delete your account. Enter your password to confirm:');
            if (password) {
                try {
                    const credential = EmailAuthProvider.credential(user.email, password);
                    await reauthenticateWithCredential(user, credential);
                    localStorage.removeItem(`avatar_${user.uid}`);
                    await deleteUser(user);
                    alert('Account deleted successfully.');
                    window.location.href = 'index.html';
                } catch (error) {
                    showMessage('Error: ' + error.message, 'error');
                }
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                document.getElementById('profileContent').innerHTML = `
                    <div style="text-align: center; padding: 3rem;">
                        <h2>Please Sign In</h2>
                        <p>You need to be signed in to view your profile.</p>
                        <a href="index.html" style="display: inline-block; margin-top: 1rem; padding: 0.5rem 1rem; background: #ff1493; color: white; text-decoration: none; border-radius: 8px;">← Back to Home</a>
                    </div>
                `;
                return;
            }
            
            currentUser = user;
            await loadUserData(user.uid);
            await renderProfile(user, userData);
        });
    </script>
</body>
</html>
