<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>All Reviews - Honestly, it.....</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .reviews-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .page-header p {
            color: var(--text-muted);
        }
        
        .search-filter-bar {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .search-input-wrapper {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .search-input {
            flex: 1;
            padding: 0.85rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #ff1493;
        }
        
        .search-btn {
            padding: 0.85rem 1.5rem;
            background: linear-gradient(135deg, #ff1493, #ffd700);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
        }
        
        .clear-search {
            padding: 0.85rem 1.5rem;
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-primary);
            font-family: inherit;
        }
        
        .filter-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        
        .sort-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .sort-option {
            padding: 0.5rem 1rem;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            color: var(--text-primary);
            font-family: inherit;
        }
        
        .sort-option:hover {
            border-color: #ff1493;
        }
        
        .sort-option.active {
            background: linear-gradient(135deg, #ff1493, #ffd700);
            color: white;
            border-color: transparent;
        }
        
        .results-info {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        
        .reviews-grid-page {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .review-card-horizontal {
            display: flex;
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }
        
        .review-card-horizontal:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        
        .review-card-image {
            flex: 0 0 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            background: var(--bg-secondary);
        }
        
        .review-card-image img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .review-card-image .no-image {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff1493, #ffd700);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        
        .review-card-content {
            flex: 1;
            padding: 1rem;
        }
        
        .review-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        
        .review-card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
            color: var(--text-primary);
        }
        
        .review-card-artist {
            color: #ff1493;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .review-card-year {
            color: var(--text-muted);
            font-size: 0.75rem;
        }
        
        .review-card-rating {
            text-align: right;
        }
        
        .rating-number {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffd700;
        }
        
        .review-card-genre {
            display: inline-block;
            background: var(--bg-secondary);
            color: #ff1493;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: 0.5rem;
        }
        
        .review-card-preview {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.4;
            margin: 0.5rem 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .read-more-btn {
            display: inline-block;
            margin-top: 0.5rem;
            color: #ff1493;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }
        
        .page-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            color: var(--text-primary);
            font-family: inherit;
        }
        
        .page-btn:hover:not(:disabled) {
            background: #ff1493;
            color: white;
            border-color: #ff1493;
        }
        
        .page-btn.active {
            background: linear-gradient(135deg, #ff1493, #ffd700);
            color: white;
            border-color: transparent;
        }
        
        .page-btn.disabled, .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .no-results {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        
        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: var(--text-primary);
        }
        
        @media (max-width: 768px) {
            .review-card-horizontal {
                flex-direction: column;
            }
            .review-card-image {
                flex: 0 0 auto;
                padding: 15px;
            }
            .search-input-wrapper {
                flex-direction: column;
            }
            .filter-row {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">Honestly, it.....</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="reviews.html" class="active">Reviews</a></li>
                <li><a href="community.html">Community</a></li>
            </ul>
            <div class="user-menu">
                <div id="authButtons">
                    <button id="signInBtn" class="auth-nav-btn">Sign In</button>
                    <button id="signUpBtn" class="auth-nav-btn-primary">Sign Up</button>
                </div>
                <div id="userAvatarContainer" style="display: none;">
                    <button id="userAvatarBtn" class="user-avatar-btn" onclick="toggleUserDropdown()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z" fill="white"/>
                        </svg>
                    </button>
                    <div id="userDropdown" class="user-dropdown" style="display: none;">
                        <div class="user-dropdown-email" id="userEmailDisplay"></div>
                        <a href="profile.html" class="user-dropdown-item">My Profile</a>
                        <a href="settings.html" class="user-dropdown-item">Settings</a>
                        <div class="dropdown-divider"></div>
                        <button id="signOutBtn" class="user-dropdown-item" style="color: #ff1493;">Sign Out</button>
                    </div>
                </div>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 12H21M3 6H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </nav>

    <div class="mobile-nav-overlay" id="mobileNavOverlay"></div>
    <div class="mobile-nav-menu" id="mobileNavMenu">
        <div class="mobile-nav-header">
            <span class="logo-text">Menu</span>
            <button class="mobile-nav-close" id="mobileNavClose">×</button>
        </div>
        <ul class="mobile-nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="reviews.html">Reviews</a></li>
            <li><a href="community.html">Community</a></li>
        </ul>
        <div id="mobileAuthContainer"></div>
    </div>

    <div class="reviews-page">
        <div class="page-header">
            <h1>All Reviews</h1>
            <p>Browse through our complete collection of album reviews</p>
        </div>

        <div class="search-filter-bar">
            <div class="search-input-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="Search by album, artist, or genre...">
                <button id="searchBtn" class="search-btn">Search</button>
                <button id="clearSearchBtn" class="clear-search">Clear</button>
            </div>
            <div class="filter-row">
                <div class="sort-buttons">
                    <button class="sort-option active" data-sort="newest">Newest</button>
                    <button class="sort-option" data-sort="oldest">Oldest</button>
                    <button class="sort-option" data-sort="rating">Top Rated</button>
                    <button class="sort-option" data-sort="artist">Artist A-Z</button>
                </div>
                <div class="results-info" id="resultsInfo"></div>
            </div>
        </div>

        <div id="reviewsContainer" class="reviews-grid-page">
            <div class="loading-spinner">Loading reviews...</div>
        </div>

        <div id="pagination" class="pagination"></div>
    </div>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-bottom">
                <p>&copy; 2026 Honestly, it..... All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div id="authModal" class="auth-modal-overlay">
        <div class="auth-modal">
            <div class="auth-modal-header">
                <h2 id="authModalTitle">Welcome Back</h2>
                <span class="auth-close" id="closeAuthModalBtn">&times;</span>
            </div>
            <div class="auth-modal-body" id="authModalBody"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { loadReviewsFromFirebase, initFirebaseReviews } from './firebase-reviews.js';

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyArSLD6TCMLWGo9uPb_IqwiOr_tkhDe1ag",
  authDomain: "honestly-it.firebaseapp.com",
  projectId: "honestly-it",
  storageBucket: "honestly-it.firebasestorage.app",
  messagingSenderId: "938783642355",
  appId: "1:938783642355:web:330ad714c0f79b7eb25d86",
  measurementId: "G-R8Q5308Y8K"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        initFirebaseReviews(db);

        let allReviews = [];
        let currentPage = 1;
        let currentSort = "newest";
        let currentSearch = "";
        const itemsPerPage = 10;

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderStars(rating) {
            const fullStars = Math.floor(rating / 2);
            const decimal = rating / 2 - fullStars;
            let starsHTML = '';
            for (let i = 0; i < fullStars; i++) starsHTML += '<span style="color: #ffd700;">★</span>';
            if (decimal >= 0.5) starsHTML += '<span style="color: #ffd700;">½</span>';
            const emptyStars = 5 - Math.ceil(rating / 2);
            for (let i = 0; i < emptyStars; i++) starsHTML += '<span style="color: var(--text-muted);">☆</span>';
            return starsHTML;
        }

        // Mobile Navigation
        function initMobileNav() {
            const menuBtn = document.getElementById('mobileMenuBtn');
            const navOverlay = document.getElementById('mobileNavOverlay');
            const navMenu = document.getElementById('mobileNavMenu');
            const navClose = document.getElementById('mobileNavClose');
            if (!menuBtn) return;
            function openMenu() { navMenu.classList.add('open'); navOverlay.style.display = 'block'; document.body.style.overflow = 'hidden'; }
            function closeMenu() { navMenu.classList.remove('open'); navOverlay.style.display = 'none'; document.body.style.overflow = ''; }
            menuBtn.addEventListener('click', openMenu);
            navClose.addEventListener('click', closeMenu);
            navOverlay.addEventListener('click', closeMenu);
            document.querySelectorAll('.mobile-nav-links a').forEach(link => link.addEventListener('click', closeMenu));
        }

        function updateMobileAuth(user) {
            const mobileAuthContainer = document.getElementById('mobileAuthContainer');
            if (!mobileAuthContainer) return;
            if (user) {
                const displayName = user.displayName || user.email.split('@')[0];
                const avatarLetter = displayName.charAt(0).toUpperCase();
                mobileAuthContainer.innerHTML = `
                    <div class="mobile-user-info">
                        <div class="mobile-user-avatar">${avatarLetter}</div>
                        <div class="mobile-user-details">
                            <div class="mobile-user-name">${escapeHtml(displayName)}</div>
                            <div class="mobile-user-email">${escapeHtml(user.email)}</div>
                        </div>
                        <button class="mobile-logout-btn" id="mobileSignOutBtn">Sign Out</button>
                    </div>
                `;
                document.getElementById('mobileSignOutBtn')?.addEventListener('click', () => { signOut(auth); closeMobileMenu(); });
            } else {
                mobileAuthContainer.innerHTML = `
                    <div class="mobile-auth-buttons">
                        <button class="mobile-signin-btn" id="mobileSignInBtn">Sign In</button>
                        <button class="mobile-signup-btn" id="mobileSignUpBtn">Create Account</button>
                    </div>
                `;
                document.getElementById('mobileSignInBtn')?.addEventListener('click', () => showAuthModal('login'));
                document.getElementById('mobileSignUpBtn')?.addEventListener('click', () => showAuthModal('signup'));
            }
        }

        function closeMobileMenu() {
            const navMenu = document.getElementById('mobileNavMenu');
            const navOverlay = document.getElementById('mobileNavOverlay');
            if (navMenu) navMenu.classList.remove('open');
            if (navOverlay) navOverlay.style.display = 'none';
            document.body.style.overflow = '';
        }

        // Auth Modal
        function showAuthModal(type) {
            const modal = document.getElementById('authModal');
            const title = document.getElementById('authModalTitle');
            const body = document.getElementById('authModalBody');
            if (type === 'login') {
                title.innerHTML = 'Welcome Back';
                body.innerHTML = `
                    <div id="loginError" class="auth-error" style="display: none;"></div>
                    <div class="auth-input-group"><input type="email" id="loginEmail" class="auth-input" placeholder="Email address"></div>
                    <div class="auth-input-group"><input type="password" id="loginPassword" class="auth-input" placeholder="Password"></div>
                    <button id="doLoginBtn" class="auth-btn-primary">Sign In</button>
                    <div class="auth-divider"><span>or</span></div>
                    <div class="auth-switch">New here? <a id="switchToSignup">Create an account</a></div>
                    <div class="auth-switch"><a id="forgotPasswordLink">Forgot password?</a></div>
                `;
                document.getElementById('doLoginBtn')?.addEventListener('click', handleLogin);
                document.getElementById('switchToSignup')?.addEventListener('click', () => showAuthModal('signup'));
                document.getElementById('forgotPasswordLink')?.addEventListener('click', showForgotPassword);
            } else {
                title.innerHTML = 'Create Account';
                body.innerHTML = `
                    <div id="signupError" class="auth-error" style="display: none;"></div>
                    <div class="auth-input-group"><input type="text" id="signupName" class="auth-input" placeholder="Display name"></div>
                    <div class="auth-input-group"><input type="email" id="signupEmail" class="auth-input" placeholder="Email address"></div>
                    <div class="auth-input-group"><input type="password" id="signupPassword" class="auth-input" placeholder="Password (min 6 characters)"></div>
                    <button id="doSignupBtn" class="auth-btn-primary">Create Account</button>
                    <div class="auth-divider"><span>or</span></div>
                    <div class="auth-switch">Already have an account? <a id="switchToLogin">Sign In</a></div>
                `;
                document.getElementById('doSignupBtn')?.addEventListener('click', handleSignup);
                document.getElementById('switchToLogin')?.addEventListener('click', () => showAuthModal('login'));
            }
            modal.style.display = 'flex';
        }

        function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }

        async function handleLogin() {
            const email = document.getElementById('loginEmail')?.value;
            const password = document.getElementById('loginPassword')?.value;
            const errorDiv = document.getElementById('loginError');
            if (!email || !password) { errorDiv.style.display = 'block'; errorDiv.textContent = 'Please enter both email and password'; return; }
            errorDiv.style.display = 'none';
            try { await signInWithEmailAndPassword(auth, email, password); closeAuthModal(); } 
            catch (error) { errorDiv.style.display = 'block'; errorDiv.textContent = error.message; }
        }

        async function handleSignup() {
            const name = document.getElementById('signupName')?.value;
            const email = document.getElementById('signupEmail')?.value;
            const password = document.getElementById('signupPassword')?.value;
            const errorDiv = document.getElementById('signupError');
            if (!name || !email || !password) { errorDiv.style.display = 'block'; errorDiv.textContent = 'Please fill in all fields'; return; }
            if (password.length < 6) { errorDiv.style.display = 'block'; errorDiv.textContent = 'Password must be at least 6 characters'; return; }
            errorDiv.style.display = 'none';
            try { const userCredential = await createUserWithEmailAndPassword(auth, email, password); await updateProfile(userCredential.user, { displayName: name }); closeAuthModal(); } 
            catch (error) { errorDiv.style.display = 'block'; errorDiv.textContent = error.message; }
        }

        async function showForgotPassword() {
            const title = document.getElementById('authModalTitle');
            const body = document.getElementById('authModalBody');
            title.innerHTML = 'Reset Password';
            body.innerHTML = `
                <div id="resetError" class="auth-error" style="display: none;"></div>
                <p>Enter your email to receive a reset link.</p>
                <div class="auth-input-group"><input type="email" id="resetEmail" class="auth-input" placeholder="Email address"></div>
                <button id="sendResetBtn" class="auth-btn-primary">Send Reset Link</button>
                <div class="auth-switch"><a id="backToLogin">Back to Sign In</a></div>
            `;
            document.getElementById('sendResetBtn')?.addEventListener('click', async () => {
                const email = document.getElementById('resetEmail')?.value;
                const errorDiv = document.getElementById('resetError');
                if (!email) { errorDiv.style.display = 'block'; errorDiv.textContent = 'Please enter your email'; return; }
                try { await sendPasswordResetEmail(auth, email); errorDiv.style.display = 'block'; errorDiv.textContent = `Reset email sent to ${email}!`; setTimeout(() => closeAuthModal(), 3000); } 
                catch (error) { errorDiv.style.display = 'block'; errorDiv.textContent = error.message; }
            });
            document.getElementById('backToLogin')?.addEventListener('click', () => showAuthModal('login'));
        }

        async function loadReviews() {
            const firebaseReviews = await loadReviewsFromFirebase();
            if (firebaseReviews.length > 0) {
                allReviews = firebaseReviews;
                localStorage.setItem('musicReviews', JSON.stringify(firebaseReviews));
            } else {
                const stored = localStorage.getItem('musicReviews');
                allReviews = stored ? JSON.parse(stored) : [];
            }
            applyFiltersAndSort();
        }

        function applySearch() {
            if (!currentSearch) return allReviews;
            const searchLower = currentSearch.toLowerCase();
            return allReviews.filter(review => 
                review.title.toLowerCase().includes(searchLower) ||
                review.artist.toLowerCase().includes(searchLower) ||
                (Array.isArray(review.genre) && review.genre.some(g => g.toLowerCase().includes(searchLower)))
            );
        }

        function sortReviews(reviews) {
            const sorted = [...reviews];
            switch(currentSort) {
                case "newest": return sorted.sort((a, b) => new Date(b.dateAdded) - new Date(a.dateAdded));
                case "oldest": return sorted.sort((a, b) => new Date(a.dateAdded) - new Date(b.dateAdded));
                case "rating": return sorted.sort((a, b) => b.rating - a.rating);
                case "artist": return sorted.sort((a, b) => a.artist.localeCompare(b.artist));
                default: return sorted;
            }
        }

        function applyFiltersAndSort() {
            const container = document.getElementById('reviewsContainer');
            const resultsInfo = document.getElementById('resultsInfo');
            
            let filtered = applySearch();
            let sorted = sortReviews(filtered);
            
            const totalItems = sorted.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const paginatedReviews = sorted.slice(startIndex, startIndex + itemsPerPage);
            
            resultsInfo.textContent = `Showing ${startIndex + 1}-${Math.min(startIndex + itemsPerPage, totalItems)} of ${totalItems} reviews`;
            
            if (paginatedReviews.length === 0) {
                container.innerHTML = '<div class="no-results">No reviews found. Try a different search!</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            
            container.innerHTML = paginatedReviews.map(review => `
                <div class="review-card-horizontal">
                    <div class="review-card-image">
                        ${review.albumArt ? `<img src="${review.albumArt}" alt="${review.title}" onerror="this.parentElement.innerHTML='<div class=\'no-image\'>🎵</div>'">` : '<div class="no-image">🎵</div>'}
                    </div>
                    <div class="review-card-content">
                        <div class="review-card-header">
                            <div>
                                <h3 class="review-card-title">${escapeHtml(review.title)}</h3>
                                <p class="review-card-artist">${escapeHtml(review.artist)}</p>
                                <p class="review-card-year">${review.year || 'N/A'}</p>
                                <span class="review-card-genre">${Array.isArray(review.genre) ? review.genre.slice(0, 2).join(', ') : review.genre}</span>
                            </div>
                            <div class="review-card-rating">
                                <div><span class="rating-number">${review.rating.toFixed(1)}</span><span>/10</span></div>
                                <div>${renderStars(review.rating)}</div>
                            </div>
                        </div>
                        <p class="review-card-preview">${escapeHtml(review.shortPreview || review.review.substring(0, 100))}...</p>
                        <a href="review.html?id=${review.firebaseId}" class="read-more-btn">Read full review →</a>
                    </div>
                </div>
            `).join('');
            
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            const paginationDiv = document.getElementById('pagination');
            if (totalPages <= 1) { paginationDiv.innerHTML = ''; return; }
            let html = `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>← Previous</button>`;
            for (let i = 1; i <= Math.min(totalPages, 5); i++) html += `<button class="page-btn ${currentPage === i ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            if (totalPages > 5) { html += `<span>...</span><button class="page-btn" onclick="changePage(${totalPages})">${totalPages}</button>`; }
            html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>`;
            paginationDiv.innerHTML = html;
        }

        window.changePage = function(page) { if (page < 1) return; currentPage = page; applyFiltersAndSort(); window.scrollTo({ top: 0, behavior: 'smooth' }); };

        function setupEventListeners() {
            document.getElementById('searchBtn').addEventListener('click', () => { currentSearch = document.getElementById('searchInput').value; currentPage = 1; applyFiltersAndSort(); });
            document.getElementById('clearSearchBtn').addEventListener('click', () => { document.getElementById('searchInput').value = ''; currentSearch = ''; currentPage = 1; applyFiltersAndSort(); });
            document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') { currentSearch = e.target.value; currentPage = 1; applyFiltersAndSort(); } });
            document.querySelectorAll('.sort-option').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.sort-option').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSort = btn.getAttribute('data-sort');
                    currentPage = 1;
                    applyFiltersAndSort();
                });
            });
        }

        window.toggleUserDropdown = function() {
            const dropdown = document.getElementById('userDropdown');
            if (dropdown) dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        };

        onAuthStateChanged(auth, (user) => {
            const authDiv = document.getElementById('authButtons');
            const avatarDiv = document.getElementById('userAvatarContainer');
            const userEmailDisplay = document.getElementById('userEmailDisplay');
            if (user) { authDiv.style.display = 'none'; avatarDiv.style.display = 'block'; if (userEmailDisplay) userEmailDisplay.textContent = user.email; }
            else { authDiv.style.display = 'flex'; avatarDiv.style.display = 'none'; }
            updateMobileAuth(user);
        });

        document.getElementById('signOutBtn')?.addEventListener('click', async () => { await signOut(auth); window.location.href = 'index.html'; });
        document.getElementById('signInBtn')?.addEventListener('click', () => showAuthModal('login'));
        document.getElementById('signUpBtn')?.addEventListener('click', () => showAuthModal('signup'));
        document.getElementById('closeAuthModalBtn')?.addEventListener('click', closeAuthModal);
        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('userDropdown');
            const avatarBtn = document.getElementById('userAvatarBtn');
            if (dropdown && avatarBtn && !avatarBtn.contains(e.target) && !dropdown.contains(e.target)) dropdown.style.display = 'none';
            if (e.target === document.getElementById('authModal')) closeAuthModal();
        });

        initMobileNav();
        loadReviews();
        setupEventListeners();
    </script>
</body>
</html>
