<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Settings - Honestly, it.....</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .settings-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
        }
        
        .setting-item {
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
        }
        
        .setting-item:last-child {
            border-bottom: none;
        }
        
        .setting-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .setting-description {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }
        
        .danger-zone {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255,20,147,0.1);
            border-radius: 10px;
            border: 1px solid #ff1493;
        }
        
        .danger-zone h3 {
            color: #ff1493;
            margin-bottom: 1rem;
        }
        
        .delete-btn {
            background: #ff1493;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 24px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background: linear-gradient(135deg, #ff1493, #ffd700);
        }
        
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        
        @media (max-width: 768px) {
            .settings-container { padding: 1rem; margin: 1rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">Honestly, it.....</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="reviews.html">Reviews</a></li>
                <li><a href="community.html">Community</a></li>
            </ul>
            <div class="user-menu">
                <div id="authButtons">
                    <button id="signInBtn" class="auth-nav-btn">Sign In</button>
                    <button id="signUpBtn" class="auth-nav-btn-primary">Sign Up</button>
                </div>
                <div id="userAvatarContainer" style="display: none;">
                    <button id="userAvatarBtn" class="user-avatar-btn" onclick="toggleUserDropdown()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 15.34 14.67 14 12 14Z" fill="white"/>
                        </svg>
                    </button>
                    <div id="userDropdown" class="user-dropdown" style="display: none;">
                        <div class="user-dropdown-email" id="userEmailDisplay"></div>
                        <a href="profile.html" class="user-dropdown-item">My Profile</a>
                        <a href="settings.html" class="user-dropdown-item">Settings</a>
                        <div class="dropdown-divider"></div>
                        <button id="signOutBtn" class="user-dropdown-item" style="color: #ff1493;">Sign Out</button>
                    </div>
                </div>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 12H21M3 6H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
    </nav>

    <div class="mobile-nav-overlay" id="mobileNavOverlay"></div>
    <div class="mobile-nav-menu" id="mobileNavMenu">
        <div class="mobile-nav-header">
            <span class="logo-text">Menu</span>
            <button class="mobile-nav-close" id="mobileNavClose">×</button>
        </div>
        <ul class="mobile-nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="reviews.html">Reviews</a></li>
            <li><a href="community.html">Community</a></li>
        </ul>
        <div id="mobileAuthContainer"></div>
    </div>

    <div class="container">
        <div id="settingsContent" class="settings-container">
            <div style="text-align: center; padding: 3rem;">Loading settings...</div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-bottom">
                <p>&copy; 2026 Honestly, it..... All rights reserved.</p>
            </div>
        </div>
    </footer>

    <div id="authModal" class="auth-modal-overlay">
        <div class="auth-modal">
            <div class="auth-modal-header">
                <h2 id="authModalTitle">Welcome Back</h2>
                <span class="auth-close" id="closeAuthModalBtn">&times;</span>
            </div>
            <div class="auth-modal-body" id="authModalBody"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, updateProfile, sendPasswordResetEmail, reauthenticateWithCredential, EmailAuthProvider, deleteUser } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyArSLD6TCMLWGo9uPb_IqwiOr_tkhDe1ag",
  authDomain: "honestly-it.firebaseapp.com",
  projectId: "honestly-it",
  storageBucket: "honestly-it.firebasestorage.app",
  messagingSenderId: "938783642355",
  appId: "1:938783642355:web:330ad714c0f79b7eb25d86",
  measurementId: "G-R8Q5308Y8K"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Mobile Navigation
        function initMobileNav() {
            const menuBtn = document.getElementById('mobileMenuBtn');
            const navOverlay = document.getElementById('mobileNavOverlay');
            const navMenu = document.getElementById('mobileNavMenu');
            const navClose = document.getElementById('mobileNavClose');
            if (!menuBtn) return;
            function openMenu() { navMenu.classList.add('open'); navOverlay.style.display = 'block'; document.body.style.overflow = 'hidden'; }
            function closeMenu() { navMenu.classList.remove('open'); navOverlay.style.display = 'none'; document.body.style.overflow = ''; }
            menuBtn.addEventListener('click', openMenu);
            navClose.addEventListener('click', closeMenu);
            navOverlay.addEventListener('click', closeMenu);
            document.querySelectorAll('.mobile-nav-links a').forEach(link => link.addEventListener('click', closeMenu));
        }

        function updateMobileAuth(user) {
            const mobileAuthContainer = document.getElementById('mobileAuthContainer');
            if (!mobileAuthContainer) return;
            if (user) {
                const displayName = user.displayName || user.email.split('@')[0];
                const avatarLetter = displayName.charAt(0).toUpperCase();
                mobileAuthContainer.innerHTML = `
                    <div class="mobile-user-info">
                        <div class="mobile-user-avatar">${avatarLetter}</div>
                        <div class="mobile-user-details">
                            <div class="mobile-user-name">${escapeHtml(displayName)}</div>
                            <div class="mobile-user-email">${escapeHtml(user.email)}</div>
                        </div>
                        <button class="mobile-logout-btn" id="mobileSignOutBtn">Sign Out</button>
                    </div>
                `;
                document.getElementById('mobileSignOutBtn')?.addEventListener('click', () => { signOut(auth); closeMobileMenu(); });
            } else {
                mobileAuthContainer.innerHTML = `
                    <div class="mobile-auth-buttons">
                        <button class="mobile-signin-btn" id="mobileSignInBtn">Sign In</button>
                        <button class="mobile-signup-btn" id="mobileSignUpBtn">Create Account</button>
                    </div>
                `;
                document.getElementById('mobileSignInBtn')?.addEventListener('click', () => showAuthModal('login'));
                document.getElementById('mobileSignUpBtn')?.addEventListener('click', () => showAuthModal('signup'));
            }
        }

        function closeMobileMenu() {
            const navMenu = document.getElementById('mobileNavMenu');
            const navOverlay = document.getElementById('mobileNavOverlay');
            if (navMenu) navMenu.classList.remove('open');
            if (navOverlay) navOverlay.style.display = 'none';
            document.body.style.overflow = '';
        }

        // Auth Modal
        function showAuthModal(type) {
            const modal = document.getElementById('authModal');
            const title = document.getElementById('authModalTitle');
            const body = document.getElementById('authModalBody');
            if (type === 'login') {
                title.innerHTML = 'Welcome Back';
                body.innerHTML = `
                    <div id="loginError" class="auth-error" style="display: none;"></div>
                    <div class="auth-input-group"><input type="email" id="loginEmail" class="auth-input" placeholder="Email address"></div>
                    <div class="auth-input-group"><input type="password" id="loginPassword" class="auth-input" placeholder="Password"></div>
                    <button id="doLoginBtn" class="auth-btn-primary">Sign In</button>
                    <div class="auth-divider"><span>or</span></div>
                    <div class="auth-switch">New here? <a id="switchToSignup">Create an account</a></div>
                    <div class="auth-switch"><a id="forgotPasswordLink">Forgot password?</a></div>
                `;
                document.getElementById('doLoginBtn')?.addEventListener('click', handleLogin);
                document.getElementById('switchToSignup')?.addEventListener('click', () => showAuthModal('signup'));
                document.getElementById('forgotPasswordLink')?.addEventListener('click', showForgotPassword);
            } else {
                title.innerHTML = 'Create Account';
                body.innerHTML = `
                    <div id="signupError" class="auth-error" style="display: none;"></div>
                    <div class="auth-input-group"><input type="text" id="signupName" class="auth-input" placeholder="Display name"></div>
                    <div class="auth-input-group"><input type="email" id="signupEmail" class="auth-input" placeholder="Email address"></div>
                    <div class="auth-input-group"><input type="password" id="signupPassword" class="auth-input" placeholder="Password (min 6 characters)"></div>
                    <button id="doSignupBtn" class="auth-btn-primary">Create Account</button>
                    <div class="auth-divider"><span>or</span></div>
                    <div class="auth-switch">Already have an account? <a id="switchToLogin">Sign In</a></div>
                `;
                document.getElementById('doSignupBtn')?.addEventListener('click', handleSignup);
                document.getElementById('switchToLogin')?.addEventListener('click', () => showAuthModal('login'));
            }
            modal.style.display = 'flex';
        }

        function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }

        async function handleLogin() {
            const email = document.getElementById('loginEmail')?.value;
            const password = document.getElementById('loginPassword')?.value;
            const errorDiv = document.getElementById('loginError');
            if (!email || !password) { errorDiv.style.display = 'block'; errorDiv.textContent = 'Please enter both email and password'; return; }
            errorDiv.style.display = 'none';
            try { await signInWithEmailAndPassword(auth, email, password); closeAuthModal(); } 
            catch (error) { errorDiv.style.display = 'block'; errorDiv.textContent = error.message; }
        }

        async function handleSignup() {
            const name = document.getElementById('signupName')?.value;
            const email = document.getElementById('signupEmail')?.value;
            const password = document.getElementById('signupPassword')?.value;
            const errorDiv = document.getElementById('signupError');
            if (!name || !email || !password) { errorDiv.style.display = 'block'; errorDiv.textContent = 'Please fill in all fields'; return; }
            if (password.length < 6) { errorDiv.style.display = 'block'; errorDiv.textContent = 'Password must be at least 6 characters'; return; }
            errorDiv.style.display = 'none';
            try { const userCredential = await createUserWithEmailAndPassword(auth, email, password); await updateProfile(userCredential.user, { displayName: name }); closeAuthModal(); } 
            catch (error) { errorDiv.style.display = 'block'; errorDiv.textContent = error.message; }
        }

        async function showForgotPassword() {
            const title = document.getElementById('authModalTitle');
            const body = document.getElementById('authModalBody');
            title.innerHTML = 'Reset Password';
            body.innerHTML = `
                <div id="resetError" class="auth-error" style="display: none;"></div>
                <p>Enter your email to receive a reset link.</p>
                <div class="auth-input-group"><input type="email" id="resetEmail" class="auth-input" placeholder="Email address"></div>
                <button id="sendResetBtn" class="auth-btn-primary">Send Reset Link</button>
                <div class="auth-switch"><a id="backToLogin">Back to Sign In</a></div>
            `;
            document.getElementById('sendResetBtn')?.addEventListener('click', async () => {
                const email = document.getElementById('resetEmail')?.value;
                const errorDiv = document.getElementById('resetError');
                if (!email) { errorDiv.style.display = 'block'; errorDiv.textContent = 'Please enter your email'; return; }
                try { await sendPasswordResetEmail(auth, email); errorDiv.style.display = 'block'; errorDiv.textContent = `Reset email sent to ${email}!`; setTimeout(() => closeAuthModal(), 3000); } 
                catch (error) { errorDiv.style.display = 'block'; errorDiv.textContent = error.message; }
            });
            document.getElementById('backToLogin')?.addEventListener('click', () => showAuthModal('login'));
        }

        async function deleteAccount(password) {
            const user = auth.currentUser;
            try {
                const credential = EmailAuthProvider.credential(user.email, password);
                await reauthenticateWithCredential(user, credential);
                await deleteUser(user);
                alert('Account deleted successfully.');
                window.location.href = 'index.html';
            } catch (error) { alert('Error deleting account: ' + error.message); }
        }

        function loadSettings() {
            const container = document.getElementById('settingsContent');
            onAuthStateChanged(auth, (user) => {
                if (!user) {
                    container.innerHTML = `<div style="text-align: center; padding: 3rem;"><h2>Please Sign In</h2><p>You need to be signed in to access settings.</p><a href="index.html" style="display: inline-block; margin-top: 1rem; padding: 0.5rem 1rem; background: #ff1493; color: white; text-decoration: none; border-radius: 8px;">← Back to Home</a></div>`;
                    return;
                }
                const darkMode = localStorage.getItem('darkMode') === 'true';
                const emailNotifications = localStorage.getItem('emailNotifications') !== 'false';
                const commentNotifications = localStorage.getItem('commentNotifications') !== 'false';
                
                container.innerHTML = `
                    <h2 style="margin-bottom: 1.5rem;">⚙️ Account Settings</h2>
                    <div class="setting-item"><div class="setting-title">🌙 Dark Mode</div><div class="setting-description">Switch between light and dark theme</div><label class="toggle-switch"><input type="checkbox" id="darkModeToggle" ${darkMode ? 'checked' : ''}><span class="slider"></span></label></div>
                    <div class="setting-item"><div class="setting-title">📧 Email Notifications</div><div class="setting-description">Receive email updates about new reviews and replies</div><label class="toggle-switch"><input type="checkbox" id="emailNotifications" ${emailNotifications ? 'checked' : ''}><span class="slider"></span></label></div>
                    <div class="setting-item"><div class="setting-title">💬 Comment Notifications</div><div class="setting-description">Get notified when someone replies to your comment</div><label class="toggle-switch"><input type="checkbox" id="commentNotifications" ${commentNotifications ? 'checked' : ''}><span class="slider"></span></label></div>
                    <div class="danger-zone"><h3>⚠️ Danger Zone</h3><div class="setting-item" style="border-bottom: none; padding-bottom: 0;"><div class="setting-title">Delete Account</div><div class="setting-description">Permanently delete your account and all your data. This action cannot be undone.</div><button onclick="showDeleteConfirm()" class="delete-btn">Delete Account</button></div></div>
                `;
                document.getElementById('darkModeToggle').addEventListener('change', (e) => {
                    localStorage.setItem('darkMode', e.target.checked);
                    if (e.target.checked) document.body.classList.add('dark-mode');
                    else document.body.classList.remove('dark-mode');
                });
                document.getElementById('emailNotifications').addEventListener('change', (e) => localStorage.setItem('emailNotifications', e.target.checked));
                document.getElementById('commentNotifications').addEventListener('change', (e) => localStorage.setItem('commentNotifications', e.target.checked));
            });
        }

        window.showDeleteConfirm = function() {
            const password = prompt('Please enter your password to confirm account deletion:');
            if (password) deleteAccount(password);
        };

        window.toggleUserDropdown = function() {
            const dropdown = document.getElementById('userDropdown');
            if (dropdown) dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        };

        onAuthStateChanged(auth, (user) => {
            const authDiv = document.getElementById('authButtons');
            const avatarDiv = document.getElementById('userAvatarContainer');
            const userEmailDisplay = document.getElementById('userEmailDisplay');
            if (user) { authDiv.style.display = 'none'; avatarDiv.style.display = 'block'; if (userEmailDisplay) userEmailDisplay.textContent = user.email; }
            else { authDiv.style.display = 'flex'; avatarDiv.style.display = 'none'; }
            updateMobileAuth(user);
            loadSettings();
        });

        document.getElementById('signOutBtn')?.addEventListener('click', async () => { await signOut(auth); window.location.href = 'index.html'; });
        document.getElementById('signInBtn')?.addEventListener('click', () => showAuthModal('login'));
        document.getElementById('signUpBtn')?.addEventListener('click', () => showAuthModal('signup'));
        document.getElementById('closeAuthModalBtn')?.addEventListener('click', closeAuthModal);
        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('userDropdown');
            const avatarBtn = document.getElementById('userAvatarBtn');
            if (dropdown && avatarBtn && !avatarBtn.contains(e.target) && !dropdown.contains(e.target)) dropdown.style.display = 'none';
            if (e.target === document.getElementById('authModal')) closeAuthModal();
        });

        initMobileNav();
    </script>
</body>
</html>
